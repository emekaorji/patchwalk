name: publish

# Push to main → this builds, bumps the version, and publishes. Nothing else to run.
on:
  push:
    branches: [main]

permissions:
  contents: write # so the version-bump commit can be pushed back

jobs:
  release:
    # Skip the bot's own version-bump commit, so it doesn't loop forever.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4 # repo forbids npm
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Gate: catch broken builds/types/lint/packaging before anything ships.
      - run: pnpm lint
      - run: pnpm esbuild:base
      - run: pnpm compile:test
      - run: pnpm package

      - name: Bump patch version
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch -m "release: v%s [skip ci]"

      - name: Publish to VS Code Marketplace
        run: pnpm publish:vs-marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # Optional (Cursor / Windsurf / VSCodium). Won't fail the run if you skip Open VSX.
      - name: Publish to Open VSX
        continue-on-error: true
        run: pnpm publish:open-vsx
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Push the version bump
        run: git push --follow-tags
