name: CI

permissions:
  contents: write # so the version-bump commit can be pushed back

# Push to main → run the full test matrix, then (if it passes and this isn't the
# bot's own bump commit) build, bump the version, and publish. One workflow.
on:
  push:
    branches:
      - main

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Get the date on Ubuntu/MacOS
        id: date_unix
        if: runner.os != 'Windows'
        run: echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Get the date on Windows
        id: date_windows
        if: runner.os == 'Windows'
        run: echo "DATE=$(Get-Date -Format 'yyyyMMdd')" >> $GITHUB_OUTPUT

      - name: Cache .vscode-test
        uses: actions/cache@v4
        env:
          # we use date as part of key because the vscode insiders updated daily
          CACHE_PREFIX: ${{ runner.os }}-vscode-test-${{ steps.date_unix.outputs.DATE || steps.date_windows.outputs.DATE }}
        with:
          path: .vscode-test
          key: ${{ env.CACHE_PREFIX }}-${{ hashFiles('test/runTests.ts') }}
          restore-keys: ${{ env.CACHE_PREFIX }}

      - run: xvfb-run -a pnpm test
        if: runner.os == 'Linux'
      - run: pnpm test
        if: runner.os != 'Linux'

  release:
    needs: test
    # Skip the bot's own version-bump commit, so it doesn't loop forever.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4 # repo forbids npm
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The test matrix already built, compiled, and ran the suite on 3 OSes.
      # Lint + package are the only gates it doesn't cover — run them before shipping.
      - run: pnpm lint
      - run: pnpm package

      - name: Bump patch version
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch -m "release: v%s [skip ci]"

      - name: Publish to VS Code Marketplace
        run: pnpm publish:vs-marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # Optional (Cursor / Windsurf / VSCodium). Won't fail the run if you skip Open VSX.
      - name: Publish to Open VSX
        continue-on-error: true
        run: pnpm publish:open-vsx
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Push the version bump
        run: git push --follow-tags

      # Bonus (was already in ci.yml): cut a GitHub Release from the new tag.
      # Non-fatal — a failure here never blocks a shipped release.
      - name: GitHub Release
        continue-on-error: true
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
